// ─── Responsive hook ─────────────────────────────────────────

const useIsMobile = () => {
  const [isMobile, setIsMobile] = React.useState(
    typeof window !== "undefined" ? window.innerWidth < 640 : false
  );
  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 640);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return isMobile;
};

// ─── Primitives ───────────────────────────────────────────────

const LBox = ({ children, style = {}, bg = LC.paper, shadow = 6, radius = 18, rotate = 0 }) => {
  // Clamp shadow to 4px on narrow screens to prevent right-edge bleed
  const effectiveShadow = typeof window !== "undefined" && window.innerWidth < 640
    ? Math.min(shadow, 4)
    : shadow;
  return (
    <div style={{
      position: "relative", border: `3px solid ${LC.ink}`, borderRadius: radius,
      background: bg, boxShadow: `${effectiveShadow}px ${effectiveShadow}px 0 0 ${LC.ink}`,
      transform: rotate ? `rotate(${rotate}deg)` : "none",
      ...style,
    }}>{children}</div>
  );
};

const LSticker = ({ color = LC.yellow, children, style = {} }) => (
  <div style={{
    display: "inline-flex", alignItems: "center", padding: "4px 12px",
    background: color, border: `2px solid ${LC.ink}`, borderRadius: 999,
    fontWeight: 800, fontSize: 12, letterSpacing: 0.5,
    boxShadow: `2px 2px 0 0 ${LC.ink}`, whiteSpace: "nowrap", width: "fit-content",
    ...style,
  }}>{children}</div>
);

const LSplat = ({ color, size = 100, style = {} }) => (

                <div style={{ fontSize: 52, color: LC.red, fontStyle: "italic", margin: "-6px 0", textShadow: `3px 3px 0 ${LC.yellow}` }}>vs</div>
                <div style={{ fontSize: 88, textShadow: `5px 5px 0 ${LC.yellow}` }}>SOFA</div>
              </div>
            ) : (
              <div style={{
                fontFamily: "'VT323', monospace", fontSize: 120, fontWeight: 900,
                lineHeight: 0.9, letterSpacing: -1, color: LC.ink,
                textShadow: `6px 6px 0 ${LC.yellow}`,
              }}>
                SOFA<br/>
                <span style={{ color: LC.red, fontStyle: "italic", fontSize: 80 }}>vs</span><br/>
                SOFA
              </div>
            )}
            <div style={{ marginTop: 16, fontSize: mob ? 14 : 18, color: LC.ink, fontWeight: 600, lineHeight: 1.45 }}>
              Two couches. Nine players. Six rounds. One bottle of rum.
              Bremen and Wulmstorf throw down for total couch-supremacy and the right
              to pick the drinks for the rest of the night.
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 18, flexWrap: "wrap" }}>
              <LSticker color={LC.bremen}    style={{ color: "#fff", fontSize: 12, padding: "7px 12px" }}>📍 DATE TBD • VOTE NOW</LSticker>
              <LSticker color={LC.wulmstorf} style={{ color: "#fff", fontSize: 12, padding: "7px 12px" }}>🛋 WULMSTORF HQ</LSticker>
              <LSticker color={LC.green}     style={{ color: "#fff", fontSize: 12, padding: "7px 12px" }}>🍕 SNACKS PROVIDED</LSticker>
            </div>
          </div>

          {/* Right: countdown + RSVP */}
          <div style={{ display: "grid", gap: 14 }}>
            <LBox bg={LC.yellow} radius={22} shadow={6}>
              <div style={{ padding: mob ? 14 : 20 }}>
                <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: 1, color: LC.ink, marginBottom: 12 }}>★ KICKOFF IN ★</div>
                <Countdown/>
              </div>
            </LBox>
            <LBox bg={LC.paper} radius={20} shadow={5}>
              <div style={{ padding: 16 }}>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: 26, fontWeight: 700, lineHeight: 1, marginBottom: 4 }}>You're invited.</div>
                <div style={{ fontSize: 12, color: LC.dim, fontWeight: 600, marginBottom: 12 }}>Tap to confirm — your team captain will know.</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  <button style={{
                    padding: "11px", background: LC.green, color: "#fff",
                    border: `3px solid ${LC.ink}`, borderRadius: 12,
                    boxShadow: `3px 3px 0 ${LC.ink}`, fontWeight: 800, fontSize: 13,
                    cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5, fontFamily: "inherit",
                  }}>✓ I'm in</button>
                  <button style={{
                    padding: "11px", background: LC.paper, color: LC.ink,
                    border: `3px solid ${LC.ink}`, borderRadius: 12,
                    boxShadow: `3px 3px 0 ${LC.ink}`, fontWeight: 800, fontSize: 13,
                    cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5, fontFamily: "inherit",
                  }}>Maybe</button>
                </div>
                <div style={{ marginTop: 10, padding: "8px 10px", background: LC.bg, borderRadius: 10, border: `2px solid ${LC.ink}`, fontSize: 11, fontWeight: 700, textAlign: "center" }}>
                  9 / 9 players confirmed 🎮
                </div>
              </div>
            </LBox>
          </div>
        </div>

        {/* ── Lineups ── */}
        <div style={{ marginBottom: mob ? 36 : 48 }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <LSticker color={LC.cyan} style={{ color: "#fff", marginBottom: 8 }}>★ THE LINEUPS ★</LSticker>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: mob ? 40 : 56, lineHeight: 1, fontWeight: 700, color: LC.ink }}>The Couches</div>
          </div>

          {mob ? (
            /* Mobile: stacked vertically with a small VS divider */
            <div style={{ display: "grid", gap: 16 }}>
              <TeamPanel team={teams[0]} color={LC.bremen}    side="A"/>
              <div style={{
                textAlign: "center",
                fontFamily: "'VT323', monospace", fontSize: 56, fontWeight: 900, color: LC.ink,
                textShadow: `3px 3px 0 ${LC.yellow}`, lineHeight: 1, padding: "4px 0",
              }}>VS</div>
              <TeamPanel team={teams[1]} color={LC.wulmstorf} side="B"/>
            </div>
          ) : (
            /* Desktop: side-by-side with big VS */
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 24, alignItems: "start" }}>
              <TeamPanel team={teams[0]} color={LC.bremen}    side="A"/>
              <div style={{
                alignSelf: "center",
                fontFamily: "'VT323', monospace", fontSize: 96, fontWeight: 900, color: LC.ink,
                textShadow: `4px 4px 0 ${LC.yellow}`, transform: "rotate(-4deg)", padding: 16,
              }}>VS</div>
              <TeamPanel team={teams[1]} color={LC.wulmstorf} side="B"/>
            </div>
          )}
        </div>

        {/* ── Format ── */}
        <div style={{ marginBottom: mob ? 36 : 48 }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <LSticker color={LC.orange} style={{ color: "#fff", marginBottom: 8 }}>★ HOW IT WORKS ★</LSticker>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: mob ? 40 : 56, lineHeight: 1, fontWeight: 700, color: LC.ink }}>The Format</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: 14 }}>
            <InfoCard color={LC.purple} icon="🎲" title="6 Rounds"        body="Each round is a different game. Round 1 = 1 pt, Round 6 = 6 pts. Higher rounds, higher stakes." rotate={-1.5}/>
            <InfoCard color={LC.cyan}   icon="🚫" title="Pick & Ban"      body="Before each round, both teams alternate banning then picking from the pool of 14 games." rotate={1}/>
            <InfoCard color={LC.pink}   icon="⚡" title="Rotating Squads" body="Each game decides how many players face off — Nidhogg is 1v1, Mario Kart is 4v4." rotate={-0.5}/>
            <InfoCard color={LC.green}  icon="🏆" title="Outside Shop"    body="Earn extra points for MVPs, fastest rounds, comebacks and trash talk. Spend on snacks & favors." rotate={1.5}/>
          </div>
        </div>

        {/* ── Outside Shop teaser ── */}
        <div style={{ marginBottom: mob ? 36 : 48 }}>
          <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "1fr 1fr", gap: 20 }}>
            <LBox bg={LC.purple} radius={22} shadow={6}>
              <div style={{ padding: mob ? 18 : 24, color: "#fff" }}>
                <LSticker color={LC.yellow}>★ EARN POINTS</LSticker>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: 36, lineHeight: 1, fontWeight: 700, marginTop: 8 }}>Be a menace.</div>
                <div style={{ fontSize: 13, fontWeight: 600, marginTop: 6, opacity: 0.95 }}>Performance points stack into the Outside Shop. Spend or lose them — they expire at midnight.</div>
                <div style={{ marginTop: 14, display: "grid", gap: 8 }}>
                  {data.POINT_ACTIONS.map(a => (
                    <div key={a.name} style={{
                      display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 12, alignItems: "center",
                      padding: "8px 12px", background: "rgba(255,255,255,0.18)", border: `2px solid ${LC.ink}`, borderRadius: 10,
                    }}>
                      <div style={{ fontSize: 20 }}>{a.icon}</div>
                      <div style={{ fontSize: 13, fontWeight: 800 }}>{a.name}</div>
                      <div style={{ fontFamily: "'VT323', monospace", fontSize: 22, fontWeight: 700 }}>+{a.points}P</div>
                    </div>
                  ))}
                </div>
              </div>
            </LBox>
            <LBox bg={LC.paper} radius={22} shadow={6}>
              <div style={{ padding: mob ? 18 : 24 }}>
                <LSticker color={LC.orange} style={{ color: "#fff" }}>★ SHOP IT</LSticker>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: 36, lineHeight: 1, fontWeight: 700, marginTop: 8 }}>The goodies.</div>
                <div style={{ fontSize: 13, color: LC.dim, fontWeight: 600, marginTop: 6 }}>Cash in points during breaks for real-world rewards.</div>
                <div style={{ marginTop: 14, display: "grid", gap: 8 }}>
                  {data.SHOP_ITEMS.map((item, i) => (
                    <PrizeRow key={item.id} icon={item.icon} name={item.name} points={item.price}
                      color={[LC.green, LC.cyan, LC.purple, LC.pink, LC.red][i % 5]}/>
                  ))}
                </div>
              </div>
            </LBox>
          </div>
        </div>

        {/* ── Game pool ── */}
        <div style={{ marginBottom: mob ? 36 : 48 }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <LSticker color={LC.green} style={{ color: "#fff", marginBottom: 8 }}>★ THE POOL ★</LSticker>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: mob ? 32 : 56, lineHeight: 1, fontWeight: 700, color: LC.ink }}>{data.GAME_POOL.length} Games on the Menu</div>
          </div>
          <LBox bg={LC.paper} radius={22} shadow={6}>
            <div style={{ padding: mob ? 14 : 22 }}>
              <div style={{ display: "grid", gridTemplateColumns: mob ? "repeat(3, 1fr)" : "repeat(7, 1fr)", gap: mob ? 8 : 10 }}>
                {data.GAME_POOL.map((g, i) => (
                  <div key={g.id} style={{
                    padding: mob ? 8 : 10,
                    background: [LC.bg2, LC.paper][i % 2],
                    border: `3px solid ${LC.ink}`, borderRadius: 12, boxShadow: `2px 2px 0 ${LC.ink}`,
                    textAlign: "center", transform: `rotate(${(i % 3 - 1) * 1.5}deg)`,
                  }}>
                    <div style={{ fontSize: mob ? 24 : 28 }}>{g.art}</div>
                    <div style={{ fontSize: mob ? 9 : 10, fontWeight: 800, marginTop: 4, lineHeight: 1.1 }}>{g.name}</div>
                    <div style={{ fontSize: 9, color: LC.dim, fontWeight: 700, marginTop: 2 }}>{g.players}</div>
                  </div>
                ))}
              </div>
              <div style={{ marginTop: 14, padding: "12px 14px", background: LC.yellow, border: `3px solid ${LC.ink}`, borderRadius: 12, fontSize: mob ? 12 : 13, fontWeight: 700, textAlign: "center" }}>
                💡 Pick & Ban happens live before each round. Captains pick the lineup.
              </div>
            </div>
          </LBox>
        </div>

        {/* ── House rules ── */}
        <div style={{ marginBottom: mob ? 36 : 48 }}>
          <LBox bg={LC.bg2} radius={22} shadow={5}>
            <div style={{ padding: mob ? 18 : 24 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, flexWrap: "wrap" }}>
                <LSticker color={LC.red} style={{ color: "#fff" }}>★ HOUSE RULES</LSticker>
                <div style={{ fontFamily: "'VT323', monospace", fontSize: 28, lineHeight: 1, fontWeight: 700 }}>Honor among gamers.</div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: mob ? "1fr" : "repeat(3, 1fr)", gap: 12 }}>
                {[
                  { n: "01", t: "Charge your controllers", b: "Every team brings working, fully-charged hardware. Dead pads = forfeit." },
                  { n: "02", t: "Snacks shared, points earned", b: "Base snacks are free for all. Outside Shop is points-only." },
                  { n: "03", t: "Trash talk welcome", b: "Fair play is honor — but heckling is encouraged. Best line wins +3P." },
                ].map(r => (
                  <div key={r.n} style={{ background: LC.paper, border: `3px solid ${LC.ink}`, borderRadius: 14, boxShadow: `3px 3px 0 ${LC.ink}`, padding: 16, display: "flex", gap: 14, alignItems: "flex-start" }}>
                    <div style={{ fontFamily: "'VT323', monospace", fontSize: 36, lineHeight: 1, color: LC.purple, fontWeight: 700, flexShrink: 0 }}>{r.n}</div>
                    <div>
                      <div style={{ fontSize: 14, fontWeight: 800 }}>{r.t}</div>
                      <div style={{ fontSize: 12, color: LC.dim, fontWeight: 600, marginTop: 4, lineHeight: 1.45 }}>{r.b}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </LBox>
        </div>

        {/* ── CTA ── */}
        <div style={{ marginBottom: 24 }}>
          <LBox bg={LC.ink} radius={24} shadow={6}>
            <div style={{ padding: mob ? "28px 18px" : "36px 28px", textAlign: "center", color: LC.yellow, position: "relative", overflow: "hidden" }}>
              <LStar color={LC.pink} size={mob ? 50 : 80} style={{ position: "absolute", top: 10, left: mob ? 10 : 30, opacity: 0.4 }}/>
              <LStar color={LC.cyan} size={mob ? 40 : 60} style={{ position: "absolute", bottom: 10, right: mob ? 10 : 30, opacity: 0.4, transform: "rotate(20deg)" }}/>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: mob ? 16 : 22, fontWeight: 700, color: LC.yellow, letterSpacing: 2 }}>★ DATE TBD — VOTE ON DOODLE ★</div>
              <div style={{ fontFamily: "'VT323', monospace", fontSize: mob ? 56 : 80, fontWeight: 900, color: "#fff", lineHeight: 1, marginTop: 8 }}>Press start.</div>
              <div style={{ fontSize: mob ? 13 : 14, color: LC.bg, marginTop: 12, fontWeight: 700 }}>The couches are loaded. The rum is poured. Pick your seat.</div>
              <a href="Sofa vs Sofa.html" style={{ textDecoration: "none" }}>
                <div style={{
                  display: "inline-block", marginTop: 20,
                  padding: mob ? "12px 22px" : "14px 28px",
                  background: LC.yellow, color: LC.ink,
                  border: `3px solid ${LC.yellow}`, borderRadius: 14,
                  boxShadow: `5px 5px 0 ${LC.bremen}`,
                  fontWeight: 800, fontSize: mob ? 14 : 16, letterSpacing: 1, cursor: "pointer", textTransform: "uppercase",
                }}>▶ Enter the Tournament App</div>
              </a>
            </div>
          </LBox>
        </div>

        <div style={{ textAlign: "center", fontSize: 11, color: LC.dim, fontWeight: 700 }}>
          SOFA vs SOFA — Wulmstorf Edition • Bremen vs Wulmstorf • 2026
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<LandingApp/>);
</script>
</body>
